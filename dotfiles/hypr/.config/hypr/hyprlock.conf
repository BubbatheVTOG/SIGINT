general {
    hide_cursor = true
    ignore_empty_input = false
    immediate_render = true
    fail_timeout = 2000
}

background {
    monitor =
    path = screenshot # This takes a screenshot of your desktop and blurs it
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(0, 0, 0, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -500
    halign = center
    valign = top
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 255, 255, 1.0)
    shadow_boost = 2.0
}

# USER
label {
    monitor =
    text =
    color = rgba(200, 200, 200, 1.0)
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, 0
    halign = center
    valign = center
}

# BATTERY (Custom for your Asahi setup)
label {
    monitor =
    text = cmd[update:1000] echo "$(cat /sys/class/power_supply/macsmc-battery/capacity)%"
    color = rgba(200, 200, 200, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = -30, 30
    halign = right
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    rounding = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 255, 255, 1.0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}
