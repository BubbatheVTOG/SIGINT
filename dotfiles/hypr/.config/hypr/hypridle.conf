general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # to turn on display after sleep
}

# 1. Dim screen (Save battery)
listener {
    timeout = 150                                # 2.5 min
    on-timeout = brightnessctl set 10% -s        # set monitor backlight to 10%
    on-resume = brightnessctl -r           # restore monitor backlight
}

# 2. Lock screen
listener {
    timeout = 300                                # 5 min
    on-timeout = loginctl lock-session           # lock screen
}

# 2b. Screen off after lock (coordinate with lid handler)
listener {
    timeout = 60                                 # 1 min
    on-timeout = pidof hyprlock && hyprctl dispatch dpms off  # turn off screen if locked
    on-resume = hyprctl dispatch dpms on         # screen on
}

# 3. Suspend (Deep sleep)
listener {
    timeout = 900                               # 15 min
    on-timeout = systemctl suspend               # suspend pc
}
